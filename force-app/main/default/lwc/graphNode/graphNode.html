<template>
    <g class={nodeClass} transform={nodeTransform} data-node-id={node.id}>
        <!-- Node Circle/Shape -->
        <circle
            r="30"
            class={statusClass}
            stroke="#e5e7eb"
            stroke-width="2">
        </circle>

        <!-- Icon (simulated with text for now) -->
        <text
            x="0"
            y="5"
            text-anchor="middle"
            class="node-icon">
            {node.nodeType}
        </text>

        <!-- Signal Badge -->
        <template if:true={hasSignals}>
            <circle
                cx="20"
                cy="-20"
                r="10"
                class="signal-badge">
            </circle>
            <text
                x="20"
                y="-16"
                text-anchor="middle"
                class="signal-text">
                {signalCount}
            </text>
        </template>

        <!-- Node Label -->
        <text
            x="0"
            y="50"
            text-anchor="middle"
            class="node-label">
            {node.name}
        </text>

        <!-- Status indicator -->
        <rect
            x="-30"
            y="35"
            width="60"
            height="4"
            class={statusClass}
            rx="2">
        </rect>
    </g>
</template>
